name: Build and Push Docker Image

on:
  push:
    branches: [main]

env:
  ACR_REGISTRY: crpi-40rfa9eb80bk7yc8.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_IMAGE: crpi-40rfa9eb80bk7yc8.cn-hangzhou.personal.cr.aliyuncs.com/hzduanshipin/script-generator

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_IMAGE }}:latest
            ${{ env.ACR_IMAGE }}:${{ github.sha }}
