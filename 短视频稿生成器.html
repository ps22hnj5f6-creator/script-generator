<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>短视频引流稿生成器</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card-bg: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #86868b;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --border: #d2d2d7;
    --tag-bg: #e8e8ed;
    --tag-text: #1d1d1f;
    --danger: #ff3b30;
    --success: #34c759;
    --warning: #ff9500;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
    --font-mono: "SF Mono", "Fira Code", "Menlo", monospace;
    --transition: 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Sidebar ===== */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
    gap: 20px;
    overflow-y: auto;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .sidebar-logo .icon { font-size: 28px; }
  .sidebar-logo h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-tertiary);
    margin-bottom: -12px;
  }

  /* Type selector */
  .type-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .type-btn {
    padding: 10px 8px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--card-bg);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    transition: var(--transition);
    text-align: center;
    line-height: 1.3;
  }
  .type-btn:hover { border-color: var(--accent); color: var(--accent); }
  .type-btn.active {
    border-color: var(--accent);
    background: rgba(0,113,227,0.06);
    color: var(--accent);
    font-weight: 600;
  }

  /* Batch count selector */
  .batch-row {
    display: flex;
    gap: 8px;
  }
  .batch-btn {
    flex: 1;
    padding: 8px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--card-bg);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    transition: var(--transition);
    text-align: center;
  }
  .batch-btn:hover { border-color: var(--accent); color: var(--accent); }
  .batch-btn.active {
    border-color: var(--accent);
    background: rgba(0,113,227,0.06);
    color: var(--accent);
    font-weight: 600;
  }

  /* AI mode toggle */
  .ai-toggle-row {
    display: flex;
    gap: 8px;
  }
  .ai-mode-btn {
    flex: 1;
    padding: 8px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--card-bg);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    transition: var(--transition);
    text-align: center;
  }
  .ai-mode-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ai-mode-btn.active {
    border-color: #8b5cf6;
    background: rgba(139,92,246,0.06);
    color: #8b5cf6;
    font-weight: 600;
  }

  /* AI config */
  .ai-config {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .api-key-input {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-family: var(--font);
    color: var(--text);
    background: var(--card-bg);
    outline: none;
    transition: var(--transition);
  }
  .api-key-input:focus { border-color: #8b5cf6; }
  .api-model-select {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-family: var(--font);
    color: var(--text);
    background: var(--card-bg);
    outline: none;
    cursor: pointer;
  }

  /* Generate button */

  .btn-generate {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    letter-spacing: -0.2px;
  }
  .btn-generate:hover { background: var(--accent-hover); transform: translateY(-0.5px); box-shadow: 0 2px 8px rgba(0,113,227,0.3); }
  .btn-generate:active { transform: translateY(0); }

  /* Stats */
  .sidebar-stats {
    background: var(--card-bg);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    border: 1px solid var(--border);
  }
  .stats-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }
  .stats-label { color: var(--text-secondary); }
  .stats-value { font-weight: 600; color: var(--accent); }

  .sidebar-footer {
    margin-top: auto;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .btn-sm {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--card-bg);
    cursor: pointer;
    font-size: 12px;
    color: var(--text-secondary);
    transition: var(--transition);
    white-space: nowrap;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.danger { color: var(--danger); border-color: transparent; }
  .btn-sm.danger:hover { background: rgba(255,59,48,0.08); }

  /* ===== Main Content ===== */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .toolbar-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .toolbar-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--tag-bg);
    color: var(--text-secondary);
    font-weight: 500;
  }
  .toolbar-right { display: flex; gap: 8px; }

  .btn-icon {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--card-bg);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.copied { border-color: var(--success); color: var(--success); background: rgba(52,199,89,0.06); }

  /* Script area */
  .script-area {
    flex: 1;
    padding: 32px 40px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

  #scriptResults { width: 100%; display: flex; flex-direction: column; align-items: center; }

  /* Batch results grid */
  .script-grid {
    width: 100%;
    max-width: 1080px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .script-grid.single { grid-template-columns: 1fr; max-width: 680px; }

  /* Loading indicator */
  #scriptLoading {
    width: 100%;
    max-width: 680px;
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 48px 32px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    text-align: center;
  }
  #scriptLoading .loading-spinner {
    width: 40px; height: 40px;
    margin: 0 auto 16px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #scriptLoading .loading-text {
    font-size: 15px; font-weight: 600; color: var(--text);
    margin-bottom: 6px;
  }
  #scriptLoading .loading-sub {
    font-size: 13px; color: var(--text-secondary);
  }
  #scriptLoading .loading-progress {
    margin-top: 14px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  #scriptLoading .loading-progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.2s ease;
  }

  .script-card {
    width: 100%;
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    position: relative;
    transition: var(--transition);
  }
  .script-card .card-number {
    position: absolute;
    top: 12px; right: 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(0,113,227,0.08);
    padding: 2px 10px;
    border-radius: 10px;
  }
  .script-card .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .card-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card-bg);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    transition: var(--transition);
  }
  .card-btn:hover { border-color: var(--accent); color: var(--accent); }
  .card-btn.copied { border-color: var(--success); color: var(--success); background: rgba(52,199,89,0.06); }

  .script-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-tertiary);
    max-width: 680px;
    width: 100%;
  }
  .script-empty .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .script-empty p { font-size: 14px; line-height: 1.6; }

  .script-text {
    font-size: 16px;
    line-height: 1.85;
    color: var(--text);
    letter-spacing: 0.2px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Structure highlight */
  .segment-label {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 8px;
    vertical-align: 2px;
  }
  .seg-hook { background: #ffebee; color: #c62828; }
  .seg-negate { background: #fff3e0; color: #e65100; }
  .seg-hint { background: #e8f5e9; color: #1b5e20; }
  .seg-cta { background: #e3f2fd; color: #0d47a1; }

  .script-meta {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .meta-tag {
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    background: var(--tag-bg);
    color: var(--text-secondary);
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1d1d1f;
    color: white;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 1000;
  }
  .toast.show { opacity: 1; }

  /* ===== Modal ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }

  .modal {
    background: var(--card-bg);
    border-radius: 16px;
    width: 90%;
    max-width: 560px;
    padding: 28px;
    box-shadow: var(--shadow-lg);
  }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .modal .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }

  .modal textarea {
    width: 100%;
    min-height: 140px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    transition: var(--transition);
  }
  .modal textarea:focus { border-color: var(--accent); }

  .modal select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    margin-bottom: 12px;
    background: white;
    cursor: pointer;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 16px;
  }
  .btn-cancel {
    padding: 10px 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--card-bg);
    cursor: pointer;
    font-size: 14px;
    color: var(--text-secondary);
    transition: var(--transition);
  }
  .btn-cancel:hover { background: #f5f5f7; }
  .btn-confirm {
    padding: 10px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }
  .btn-confirm:hover { background: var(--accent-hover); }
  .btn-confirm.warn { background: var(--warning); }
  .btn-confirm.warn:hover { background: #e68600; }

  /* ===== Knowledge Panel ===== */
  .kb-panel {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 360px;
    background: var(--card-bg);
    border-left: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
    z-index: 50;
    display: flex;
    flex-direction: column;
  }
  .kb-panel.open { transform: translateX(0); }

  .kb-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .kb-header h3 { font-size: 16px; font-weight: 700; }
  .kb-close {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: var(--tag-bg);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    transition: var(--transition);
  }
  .kb-close:hover { background: #d2d2d7; }

  .kb-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .kb-item {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.6;
    position: relative;
    cursor: pointer;
    transition: var(--transition);
  }
  .kb-item:hover { border-color: var(--accent); }
  .kb-item .kb-type {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .kb-item .kb-text {
    color: var(--text-secondary);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .kb-item .kb-delete {
    position: absolute;
    top: 8px; right: 8px;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-tertiary);
    opacity: 0;
    transition: var(--transition);
  }
  .kb-item:hover .kb-delete { opacity: 1; }
  .kb-item .kb-delete:hover { color: var(--danger); background: rgba(255,59,48,0.08); }

  .kb-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-tertiary);
    font-size: 13px;
    line-height: 1.6;
  }

  /* Loading pulse */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .generating {
    animation: pulse 1.2s ease-in-out infinite;
  }

  /* History */
  .history-area {
    padding: 0 28px 20px;
    display: none;
  }
  .history-area.show { display: block; }
  .history-area h4 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 10px;
    padding: 0 12px;
  }
  .history-grid {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 4px 0 8px;
  }
  .history-item {
    min-width: 200px;
    max-width: 240px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--card-bg);
    cursor: pointer;
    transition: var(--transition);
    flex-shrink: 0;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-item .h-type {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .history-item .h-preview {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #b0b0b8; }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <span class="icon">🎬</span>
    <h1>引流稿生成器</h1>
  </div>

  <div class="section-label">脚本类型</div>
  <div class="type-grid" id="typeGrid">
    <button class="type-btn active" data-type="news">📰 新闻突发型</button>
    <button class="type-btn" data-type="crisis">⚠️ 危机预警型</button>
    <button class="type-btn" data-type="reverse">🔄 反认知型</button>
    <button class="type-btn" data-type="story">📖 故事沉浸型</button>
    <button class="type-btn" data-type="dialogue">💬 对话剧情型</button>
    <button class="type-btn" data-type="record">🏆 战绩背书型</button>
  </div>

  <div class="section-label">生成数量</div>
  <div class="batch-row" id="batchRow">
    <button class="batch-btn active" data-batch="1">1 条</button>
    <button class="batch-btn" data-batch="3">3 条</button>
    <button class="batch-btn" data-batch="5">5 条</button>
  </div>


  <div class="section-label" style="margin-top:4px;">🤖 AI 模型</div>
  <div class="ai-toggle-row">
    <button class="ai-mode-btn active" data-mode="template" id="modeTemplate">📋 模板</button>
    <button class="ai-mode-btn" data-mode="deepseek" id="modeDeepseek">🧠 AI</button>
  </div>
  <div class="ai-config" id="aiConfig" style="display:none;">
    <input type="password" class="api-key-input" id="apiKeyInput" placeholder="输入 DeepSeek API Key">
    <select class="api-model-select" id="modelSelect">
      <option value="deepseek-chat">DeepSeek V3（快速）</option>
      <option value="deepseek-reasoner">DeepSeek R1（深度）</option>
    </select>
    <div style="font-size:10px;color:var(--text-tertiary);margin-top:4px;">
      Key 仅存储在本地浏览器，不会上传到任何服务器
    </div>
    <label style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:11px;color:var(--text-secondary);cursor:pointer;">
      <input type="checkbox" id="proxyToggle" checked style="accent-color:var(--accent);">
      使用本地代理（需先启动 node deepseek-proxy.js）
    </label>

function pickRandomSeed(type) {
  // 1. 从知识库中找匹配类型的
  const sameType = state.knowledgeBase.filter(item => item.type === type);
  if (sameType.length > 0) {
    return sameType[Math.floor(Math.random() * sameType.length)].text;
  }
  
  // 2. 知识库中没有同类型，从全部知识库随机选
  if (state.knowledgeBase.length > 0) {
    return state.knowledgeBase[Math.floor(Math.random() * state.knowledgeBase.length)].text;
  }
  
  // 3. 知识库为空，从内置种子中选
  const sameTypeSeeds = DEFAULT_SEEDS.filter(s => s.type === type);
  if (sameTypeSeeds.length > 0) {
    return sameTypeSeeds[Math.floor(Math.random() * sameTypeSeeds.length)].text;
  }
  
  // 4. 最后的兜底：从全部内置种子随机选
  return DEFAULT_SEEDS[Math.floor(Math.random() * DEFAULT_SEEDS.length)].text;
}

  // 从输入框获取并清理 API Key：只保留可打印 ASCII，排除非法 Unicode
  const rawKey = state.aiApiKey || document.getElementById('apiKeyInput').value.trim();
  const apiKey = rawKey.replace(/[^\x20-\x7e]/g, '');
  if (!apiKey) throw new Error('请先输入 DeepSeek API Key（仅支持英文和数字）');

  const model = state.aiModel;
  const url = state.useProxy ? DEEPSEEK_CONFIG.proxyUrl : DEEPSEEK_CONFIG.baseUrl;

  // 用 Headers 对象确保所有值都是合法的 HTTP 头
  const headers = new Headers();
  headers.set('Content-Type', 'application/json');
  headers.set('Authorization', 'Bearer ' + apiKey);

  const body = JSON.stringify({
    model: model,
    messages: [
      { role: 'system', content: systemPrompt },
      { role: 'user', content: userPrompt }
    ],
    max_tokens: DEEPSEEK_CONFIG.maxTokens,
    temperature: DEEPSEEK_CONFIG.temperature,
    stream: false
  });

  let response;
  try {
    response = await fetch(url, { method: 'POST', headers: headers, body: body });
  } catch (fetchErr) {
    // 代理不可用时，给出明确的指引
    if (state.useProxy && fetchErr.message && fetchErr.message.includes('fetch')) {
      throw new Error(
        '代理连接失败。请确认：\n' +
        '1. 终端已运行: node deepseek-proxy.js\n' +
        '2. 代理运行在 http://localhost:3001\n' +
        '（' + fetchErr.message + '）'
      );
    }
    throw new Error('请求失败: ' + fetchErr.message);
  }

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error('API 请求失败 (' + response.status + '): ' + (err.error?.message || response.statusText));
  }

  const data = await response.json();
  const text = data.choices?.[0]?.message?.content || '';
  
  if (!text.trim()) throw new Error('API 返回内容为空，请检查 Key 是否正确');

  return text.trim();
}

// DeepSeek 模式下的生成流程：随机挑一条种子稿，仿写
async function generateWithDeepSeek(type) {
  // 先用模板生成一条稿子，再让 DeepSeek 仿写润色
  const templateScript = generateScriptRaw(type);
  const seedText = templateScript.full;
  const { system: systemPrompt, user: userPrompt } = buildDeepSeekPrompt(type, seedText);
  const text = await callDeepSeekAPI(systemPrompt, userPrompt);
  
  // 禁词过滤
  const hasFW = hasForbiddenWord(text);
  const cleanText = hasFW ? censorScriptRaw(text) : text;
  const remainingFW = hasForbiddenWord(cleanText);
  
  // 构建结果对象
  const charCount = cleanText.replace(/\s/g, '').length;
  const sentences = cleanText.split(/[。！？\n]/).filter(s => s.trim());
  
  const structureObj = { full: cleanText, sentenceCount: sentences.length };
  
  return {
    full: cleanText,
    structure: structureObj,
    type,
    charCount,
    clean: !remainingFW,
    dirtyWord: remainingFW || '',
    retries: 0,
    timestamp: new Date().toISOString(),
    id: 'ai_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    aiGenerated: true
  };
}

// 对纯文本进行禁词过滤（不依赖 script 对象）
function censorScriptRaw(text) {
  for (let retry = 0; retry < 8; retry++) {
    const word = hasForbiddenWord(text);
    if (!word) return text;
    text = text.replace(new RegExp(word, 'g'), '【已过滤】');
  }
  return text;
}


// ----- 禁词检测与过滤 -----
function hasForbiddenWord(text) {
  const lower = text.toLowerCase();
  for (let i = 0; i < FORBIDDEN_WORDS.length; i++) {
    if (lower.includes(FORBIDDEN_WORDS[i].toLowerCase())) return FORBIDDEN_WORDS[i];
  }
  return null;
}

function censorScript(script, maxRetries = 8) {
  for (let i = 0; i < maxRetries; i++) {
    const found = hasForbiddenWord(script.full);
    if (!found) return { script, clean: true, retries: i };
    script = generateScriptRaw(script.type);
  }
  const found = hasForbiddenWord(script.full);
  return { script, clean: !found, retries: maxRetries, dirtyWord: found };
}

// ----- 从文本中提取短语素材 -----
function extractPhrasesFromScript(text) {
  // 先按完整句子切分
  const rawSentences = text.split(/[。！？\n]+/).filter(s => s.trim().length > 4);
  
  const extracted = {
    hooks: [],
    events: [],
    emotions: [],
    identities: [],
    infoGaps: [],
    negateBlocks: [],
    hints: [],
    benefits: [],
    ctas: []
  };

  // 提取否定板块组合（匹配完整否定短语）
  rawSentences.forEach(s => {
    const negMatch = s.match(/(?:忘掉|放下|别再|别再看|删除|不看|不要再看|别死磕)([^，。！？\n]+)/g);
    if (negMatch) negMatch.forEach(m => extracted.negateBlocks.push(m.trim()));
  });

  // 提取CTA（完整CTA句子）
  rawSentences.forEach(s => {
    if (/(?:点头像|进直播间|来直播间|抓紧时间过来|赶紧来|马上开播|正在讲|正在分享)/.test(s)) {
      const cleaned = s.replace(/^[,，\s]+/, '').trim();
      if (cleaned.length >= 6 && cleaned.length <= 60) extracted.ctas.push(cleaned);
    }
  });

  // 提取情绪短语 —— 匹配完整句子，而非截断片段
  const emotionKeywords = ['激动', '颤抖', '不敢相信', '坐不住', '彻夜无眠', '饭都没吃', '催我', '赶回'];
  rawSentences.forEach(s => {
    for (const kw of emotionKeywords) {
      if (s.includes(kw)) { extracted.emotions.push(s.trim()); break; }
    }
  });

  // 提取身份/权威短语 —— 匹配完整句子
  const idKeywords = ['团队', '复盘', '梳理', '研报', '讨论'];
  rawSentences.forEach(s => {
    for (const kw of idKeywords) {
      if (s.includes(kw)) { extracted.identities.push(s.trim()); break; }
    }
  });

  // 提取信息差短语
  const gapKeywords = ['不知道', '忽略', '没注意到', '不一样', '没发现', '没人看', '还没怎么涨', '还不清楚', '不是', '并不在'];
  rawSentences.forEach(s => {
    for (const kw of gapKeywords) {
      if (s.includes(kw)) { extracted.infoGaps.push(s.trim()); break; }
    }
  });

  // 提取收益暗示短语
  const benefitKeywords = ['少走弯路', '真东西', '位置', '横盘', '主力', '主升浪', '万亿', '共振', '爆发期', '低位', '吸筹'];
  rawSentences.forEach(s => {
    for (const kw of benefitKeywords) {
      if (s.includes(kw) && s.length >= 10 && s.length <= 50) {
        extracted.benefits.push(s.trim()); break;
      }
    }
  });

  // 各项质量控制：过滤太短/太长/以虚词开头的碎片
  const qualityFilter = (arr, minLen = 6, maxLen = 55) => {
    return [...new Set(arr)]
      .filter(s => {
        const t = s.trim();
        if (t.length < minLen || t.length > maxLen) return false;
        // 过滤以虚词/标点/填充词开头的碎片
        if (/^[，,。！？的了呢吗啊呀就还也又才便呃嗯唉]/.test(t)) return false;
        // 过滤纯否定动词开头且太短的
        if (t.length < 12 && /^(忘掉|放下|删除|别再|不看)/.test(t)) return false;
        // 过滤反问句（含"吗？"但无明确信息价值）
        if (t.includes('吗？') && t.length < 20) return false;
        // 过滤明显重复的短语（与已有默认短语高度相似）
        if (t.length < 15 && /^(不知道|还不清楚|还没|已经)/.test(t)) return false;
        return true;
      })
      .slice(0, 12); // 每类最多12条
  };

  Object.keys(extracted).forEach(k => {
    extracted[k] = qualityFilter(extracted[k], 6, 80);
  });

  return extracted;
}

// ----- 分析脚本结构，分解为四段 -----
function analyzeScriptStructure(text) {
  const sentences = text.split(/[。！？\n]+/).filter(s => s.trim().length > 3);
  const total = sentences.length;

  if (total < 3) return null;

  // 简单分段：前30%为开篇钩子，接下来20%为否定，接下来30%为暗示，最后20%为CTA
  const hookEnd = Math.max(1, Math.floor(total * 0.35));
  const negateEnd = Math.max(hookEnd + 1, Math.floor(total * 0.55));
  const hintEnd = Math.max(negateEnd + 1, Math.floor(total * 0.80));

  return {
    hook: sentences.slice(0, hookEnd).join('。'),
    negate: sentences.slice(hookEnd, negateEnd).join('。'),
    hint: sentences.slice(negateEnd, hintEnd).join('。'),
    cta: sentences.slice(hintEnd).join('。'),
    full: text,
    sentenceCount: total
  };
}

// ----- 构建短语池 -----
function buildPhrasePool() {
  const pool = JSON.parse(JSON.stringify(DEFAULT_PHRASES));

  // 从知识库中补充
  state.knowledgeBase.forEach(item => {
    if (item.extracted) {
      if (item.extracted.hooks?.length) {
        const hookKey = 'hook' + item.type.charAt(0).toUpperCase() + item.type.slice(1);
        if (pool[hookKey]) pool[hookKey].push(...item.extracted.hooks);
      }
      if (item.extracted.events?.length) {
        pool.eventPhrases.push(...item.extracted.events);
      }
      if (item.extracted.emotions?.length) {
        pool.emotionPhrases.push(...item.extracted.emotions);
      }
      if (item.extracted.identities?.length) {
        pool.identityPhrases.push(...item.extracted.identities);
      }
      if (item.extracted.infoGaps?.length) {
        pool.infoGapPhrases.push(...item.extracted.infoGaps);
      }
      if (item.extracted.benefits?.length) {
        pool.benefitPhrases.push(...item.extracted.benefits);
      }
      if (item.extracted.ctas?.length) {
        pool.ctaPhrases.push(...item.extracted.ctas);
      }
      if (item.extracted.negateBlocks?.length) {
        pool.negatePhrases.push(...item.extracted.negateBlocks);
      }
      if (item.extracted.hints?.length) {
        pool.suspensePhrases.push(...item.extracted.hints);
      }
    }
  });

  // 去重
  Object.keys(pool).forEach(k => {
    if (Array.isArray(pool[k])) pool[k] = [...new Set(pool[k])];
  });

  return pool;
}

// ----- 随机选取 -----
function pickRandom(arr, count = 1, avoidSet = new Set()) {
  if (!arr || arr.length === 0) return count === 1 ? '' : [];
  const available = arr.filter(item => !avoidSet.has(item));
  const source = available.length > 0 ? available : arr;

  if (count === 1) {
    return source[Math.floor(Math.random() * source.length)];
  }

  const result = [];
  const used = new Set();
  const maxAttempts = Math.min(count * 3, source.length * 2);

  for (let i = 0; i < Math.min(count, source.length); i++) {
    let attempts = 0;
    let item;
    do {
      item = source[Math.floor(Math.random() * source.length)];
      attempts++;
    } while (used.has(item) && attempts < maxAttempts);
    used.add(item);
    result.push(item);
  }

  return result;
}

// ----- 随机选择N个板块名用于否定 -----
function pickNegateTargets(pool, count = 3) {
  const targets = pool.negateTargetList.filter(t => t.length <= 8);
  const unique = [...new Set(targets)];
  if (unique.length < count) return unique;
  return pickRandom(unique, count);
}

// ============================================================
// 6大类型的专属生成器（每个类型完全独立的生成逻辑）
// ============================================================

// ----- 基础工具函数 -----
function pick2(arr) {
  if (!arr || arr.length === 0) return '';
  return arr[Math.floor(Math.random() * arr.length)];
}

function pickN(arr, n) {
  if (!arr || arr.length === 0) return [];
  const pool = [...arr];
  const result = [];
  for (let i = 0; i < Math.min(n, pool.length); i++) {
    const idx = Math.floor(Math.random() * pool.length);
    result.push(pool.splice(idx, 1)[0]);
  }
  return result;
}

function maybe(decimalChance, fn) {
  if (Math.random() < decimalChance) return fn();
  return null;
}


// 安全拼接 - 去除尾部标点避免双句号
function joinClean(parts, sep) {
  return parts.filter(Boolean).map(p => ('' + p).replace(/[。！？]+$/g, '')).join(sep || '。');
}

// ============================================================
// 6大类型的专属生成器（叙述模板系统）
// 核心设计：用完整叙述模板替代逐环节拼接，确保每一条都通顺自然
// ============================================================

// ----- 叙述级素材构建器（产出完整自然句，而非孤立短语）-----

// 否定块：返回一句完整的、自然的否定陈述
function buildNegateSentence(pool) {
  const targets = pickN(pool.negateTargetList, 3);
  const styles = [
    () => `忘掉${targets[0]}，放下${targets[1]}，别再死磕${targets[2]}，${pick2(pool.negatePhrases)}`,
    () => `现在啊你就忘掉${targets[0]}，忘掉${targets[1]}，忘掉${targets[2]}，${pick2(pool.negatePhrases)}`,
    () => `删除${targets[0]}，删除${targets[1]}，删除${targets[2]}，${pick2(pool.negatePhrases)}`,
    () => `放下${targets[0]}，放下${targets[1]}，放下${targets[2]}，${pick2(pool.negatePhrases)}`,
    () => `别再死磕${targets[0]}、${targets[1]}、${targets[2]}这些老赛道了，${pick2(pool.negatePhrases)}`
  ];
  return pick2(styles)();
}

// 软否定（不带三连动词，更自然地融入对话）
function buildNegateLight(pool) {
  const targets = pickN(pool.negateTargetList, 2);
  const styles = [
    () => `你现在还盯着${targets[0]}和${targets[1]}的话，方向可能就偏了`,
    () => `很多人还在看${targets[0]}、${targets[1]}，其实重心早就不在那了`,
    () => `${targets[0]}和${targets[1]}这些，已经不是现在最值得关注的了`
  ];
  return pick2(styles)();
}

// 安全选取身份短语（避免"我们我们..."、"我们我..."重复）
function pickIdentity(pool) {
  const phrase = pick2(pool.identityPhrases);
  if (!phrase) return '';
  // 模板中已前置"我们"，所以去掉短语开头的"我们"或"我"
  return phrase.replace(/^我们[,\s，]*/, '').replace(/^我[,\s，]*/, '');
}

// 信息差句：自然表达"你知道的还不够"
function buildInfoGapSentence(pool) {
  const styles = [
    () => pick2(pool.infoGapPhrases),
    () => `说实话，${pick2(pool.infoGapPhrases)}`,
    () => `${pick2(pool.infoGapPhrases)}，但大部分人还没注意到`,
    () => `我跟你说句实话，${pick2(pool.infoGapPhrases)}`
  ];
  return pick2(styles)();
}

// 利益暗示句
function buildBenefitSentence(pool) {
  const styles = [
    () => pick2(pool.benefitPhrases),
    () => `${pick2(pool.benefitPhrases)}，就看你能不能抓住了`,
    () => `${pick2(pool.benefitPhrases)}，这次真的不一样`,
    () => `你要知道了，${pick2(pool.benefitPhrases)}`
  ];
  return pick2(styles)();
}

// 新方向句（不说具体是什么，但暗示存在）
function buildNewDirection(pool) {
  const styles = [
    () => '一个全新的方向已经浮出水面',
    () => '新的主线方向已经出现了',
    () => '有一个方向值得你重点关注',
    () => '真正值得看的方向，可能和你现在想的完全不一样',
    () => '新的核心方向，我已经连续观察了好几天',
    () => '这个方向很特别，之前还没什么人在关注'
  ];
  return pick2(styles)();
}

// 危机风险详细描述
function buildRiskDetail(pool) {
  const riskTargets = pickN(pool.negateTargetList, 2);
  const styles = [
    () => `尤其是手里还拿着${riskTargets.join('、')}的朋友，${pick2(pool.crisisRisk)}`,
    () => `重仓${riskTargets.join('、')}的注意了，${pick2(pool.crisisRisk)}`,
    () => `${riskTargets.join('、')}这些方向，${pick2(pool.crisisRisk)}`
  ];
  return pick2(styles)();
}


// ====== 类型1：新闻突发型 ======
// 核心：事件+情绪融合开篇 → 信息差 → 行动，否定可选
function genNews(pool, cfg) {
  const templates = [
    // 模板A：事件+情绪融合 → 信息差 → 利益 → CTA（简洁有力，4环）
    () => {
      const event = pick2(pool.hookNews || pool.eventPhrases);
      const emotion = pick2(pool.emotionPhrases);
      const infoGap = buildInfoGapSentence(pool);
      const benefit = buildBenefitSentence(pool);
      const cta = pick2(pool.ctaPhrases);
      let full = `${event}，${emotion}。${infoGap}。${benefit}。${cta}`;
      if (cfg.extraSections >= 1) {
        const extraGap = pick2(pool.infoGapPhrases);
        full = full.replace(benefit + '。', extraGap + '。' + benefit + '。');
      }
      return full;
    },
    // 模板B：否定先入 → 事件 → 情绪 → 信息差 → CTA
    () => {
      const negate = buildNegateSentence(pool);
      const event = pick2(pool.eventPhrases);
      const emotion = pick2(pool.emotionPhrases);
      const infoGap = buildInfoGapSentence(pool);
      const cta = pick2(pool.ctaPhrases);
      let full = `${negate}。${event}，${emotion}。${infoGap}。${cta}`;
      if (cfg.extraSections >= 1) {
        const benefit = buildBenefitSentence(pool);
        full = full.replace(cta, benefit + '。' + cta);
      }
      return full;
    },
    // 模板C：事件 → 情绪 → 团队分析 → 信息差 → CTA（身份自然融入）
    () => {
      const event = pick2(pool.hookNews || pool.eventPhrases);
      const emotion = pick2(pool.emotionPhrases);
      const identity = pickIdentity(pool);
      const infoGap = buildInfoGapSentence(pool);
      const cta = pick2(pool.ctaPhrases);
      let full = `${event}，${emotion}。我们${identity}。${infoGap}。${cta}`;
      if (cfg.extraSections >= 1) {
        const benefit = buildBenefitSentence(pool);
        full = full.replace(cta, benefit + '。' + cta);
      }
      return full;
    },
    // 模板D：事件 → 否定 → 信息差 → 利益 → CTA
    () => {
      const event = pick2(pool.eventPhrases);
      const negate = buildNegateSentence(pool);
      const infoGap = buildInfoGapSentence(pool);
      const benefit = buildBenefitSentence(pool);
      const cta = pick2(pool.ctaPhrases);
      let full = `${event}。${negate}。${infoGap}。${benefit}。${cta}`;
      return full;
    },
  ];
  const tpl = pick2(templates);
  const full = tpl();
  return { full, structure: { full }, sentenceCount: full.split(/[。！？]/).filter(s => s.trim()).length };
}

// ====== 类型2：危机预警型 ======
// 核心：警告 → 风险 → 调仓指令 → CTA
function genCrisis(pool, cfg) {
  const templates = [
    () => {
      const warning = pick2(pool.crisisWarning);
      const riskDetail = buildRiskDetail(pool);
      const negate = '赶紧调仓！' + pick2(pool.negatePhrases);
      const newHint = buildNewDirection(pool);
      const cta = pick2(pool.ctaPhrases);
      let full = `${warning}？${riskDetail}。${negate}。${newHint}，${cta}`;
      return full;
    },
    () => {
      const warning = pick2(pool.crisisWarning);
      const riskDetail = buildRiskDetail(pool);
      const negate = '赶紧调仓，' + pick2(pool.negatePhrases);
      const infoGap = buildInfoGapSentence(pool);
      const cta = pick2(pool.ctaPhrases);
      let full = `${warning}，${riskDetail}。${negate}。${infoGap}。${cta}`;
      if (cfg.extraSections >= 1) {
        const extraRisk = pick2(pool.crisisRisk);
        full = full.replace(negate + '。', negate + '。' + extraRisk + '。');
      }
      return full;
    },
    () => {
      const warning = pick2(pool.crisisWarning);
      const riskDetail = buildRiskDetail(pool);
      const negate = '听我一句劝，' + pick2(pool.negatePhrases);
      const cta = pick2(pool.ctaPhrases);
      let full = `${warning}！${riskDetail}。${negate}。${cta}`;
      if (cfg.extraSections >= 1) {
        const newHint = pick2(pool.suspensePhrases);
        full = full.replace(cta, newHint + '。' + cta);
      }
      return full;
    },
  ];
  const tpl = pick2(templates);
  const full = tpl();
  return { full, structure: { full }, sentenceCount: full.split(/[。！？]/).filter(s => s.trim()).length };
}

// ====== 类型3：反认知型 ======
// 核心：三连否定 → 新方向 → 信息差 → CTA
function genReverse(pool, cfg) {
  const templates = [
    () => {
      const negate = buildNegateSentence(pool);
      const newDir = buildNewDirection(pool);
      const infoGap = buildInfoGapSentence(pool);
      const benefit = buildBenefitSentence(pool);
      const cta = pick2(pool.ctaPhrases);
      let full = `${negate}。${newDir}。${infoGap}。${benefit}。${cta}`;
      if (cfg.extraSections >= 1) {
        const extraBenefit = pick2(pool.benefitPhrases);
        full = full.replace(cta, extraBenefit + '。' + cta);
      }
      return full;
    },
    () => {
      const negate = buildNegateSentence(pool);
      const event = pick2(pool.eventPhrases);
      const newDir = buildNewDirection(pool);
      const infoGap = buildInfoGapSentence(pool);
      const cta = pick2(pool.ctaPhrases);
      let full = `${negate}。${event}。${newDir}。${infoGap}。${cta}`;
      return full;
    },
    () => {
      const negate = buildNegateSentence(pool);
      const identity = pickIdentity(pool);
      const newDir = buildNewDirection(pool);
      const infoGap = buildInfoGapSentence(pool);
      const cta = pick2(pool.ctaPhrases);
      let full = `${negate}。我们${identity}。${newDir}。${infoGap}。${cta}`;
      if (cfg.extraSections >= 1) {
        const benefit = buildBenefitSentence(pool);
        full = full.replace(cta, benefit + '。' + cta);
      }
      return full;
    },
  ];
  const tpl = pick2(templates);
  const full = tpl();
  return { full, structure: { full }, sentenceCount: full.split(/[。！？]/).filter(s => s.trim()).length };
}

// ====== 类型4：故事沉浸型 ======
// 核心：场景 → 发现 → 信息差 → CTA（自然叙事，最少环节）
function genStory(pool, cfg) {
  const templates = [
    () => {
      const scene = pick2(pool.storyScene);
      const discovery = pick2(pool.storyDiscovery);
      const identity = pick2(pool.identityPhrases);
      const infoGap = buildInfoGapSentence(pool);
      const cta = pick2(pool.ctaPhrases);
      let full = `${scene}，${discovery}，${identity}，${infoGap}。${cta}`;
      if (cfg.extraSections >= 1) {
        const benefit = pick2(pool.benefitPhrases);
        full = full.replace(cta, benefit + '。' + cta);
      }
      return full;
    },
    () => {
      const scene = pick2(pool.storyScene);
      const discovery = pick2(pool.storyDiscovery);
      const infoGap = buildInfoGapSentence(pool);
      const benefit = pick2(pool.benefitPhrases);
      const cta = pick2(pool.ctaPhrases);
      let full = `${scene}，${discovery}。${infoGap}。${benefit}。${cta}`;
      return full;
    },
    () => {
      const scene = pick2(pool.storyScene);
      const discovery = pick2(pool.storyDiscovery);
      const negate = buildNegateLight(pool);
      const infoGap = buildInfoGapSentence(pool);
      const cta = pick2(pool.ctaPhrases);
      let full = `${scene}。${discovery}，${negate}。${infoGap}。${cta}`;
      if (cfg.extraSections >= 1) {
        const benefit = buildBenefitSentence(pool);
        full = full.replace(cta, benefit + '。' + cta);
      }
      return full;
    },
  ];
  const tpl = pick2(templates);
  const full = tpl();
  return { full, structure: { full }, sentenceCount: full.split(/[。！？]/).filter(s => s.trim()).length };
}

// ====== 类型5：对话剧情型 ======
function genDialogue(pool, cfg) {
  const dialogue = pick2(pool.dialogueScripts);
  return { full: dialogue, structure: { full: dialogue }, sentenceCount: dialogue.split(/[。！？\n\r]+/).filter(s => s.trim()).length };
}

// ====== 类型6：战绩背书型 ======
// 核心：战绩 → 转折 → 新方向 → CTA
function genRecord(pool, cfg) {
  const templates = [
    () => {
      const proof = pick2(pool.recordProof);
      const transition = pick2(pool.recordTransition);
      const newHint = buildNewDirection(pool);
      const infoGap = buildInfoGapSentence(pool);
      const cta = pick2(pool.challengeCta);
      let full = `${proof}。${transition}。${newHint}。${infoGap}。${cta}`;
      return full;
    },
    () => {
      const proof = pick2(pool.recordProof);
      const transition = pick2(pool.recordTransition);
      const newHint = pick2(pool.suspensePhrases);
      const cta = pick2(pool.challengeCta);
      let full = `${proof}。${transition}。${newHint}。${cta}`;
      if (cfg.extraSections >= 1) {
        const infoGap = buildInfoGapSentence(pool);
        full = full.replace(newHint + '。', newHint + '。' + infoGap + '。');
      }
      return full;
    },
    () => {
      const proof = pick2(pool.recordProof);
      const transition = pick2(pool.recordTransition);
      const cta = pick2(pool.challengeCta);
      let full = `${proof}。${transition}。${cta}`;
      if (cfg.extraSections >= 1) {
        const infoGap = buildInfoGapSentence(pool);
        full = full.replace(transition + '。', transition + '。' + infoGap + '。');
      }
      return full;
    },
  ];
  const tpl = pick2(templates);
  const full = tpl();
  return { full, structure: { full }, sentenceCount: full.split(/[。！？]/).filter(s => s.trim()).length };
}

// ====== 月度热点板块（用于生成否定目标）======
function getMonthlyHotSectors() {
  const sectorCycle = [
    ['芯片', '半导体', 'AI算力', '机器人', 'CPO'],        // 1月
    ['电力', '光伏', '储能', '新能源', '有色金属'],       // 2月
    ['创新药', '医药', '消费', '白酒', '券商'],          // 3月
    ['光模块', 'PCB', '存储', '军工', '通信设备'],       // 4月
    ['电力', '商业航天', '低空经济', '机器人', 'AI应用'], // 5月
    ['半导体', '芯片', '消费电子', 'PCB', '光模块'],      // 6月
    ['AI应用', '机器人', '固态电池', 'CPO', '科技'],      // 7月
    ['电力', '新能源', '光伏', '储能', '有色金属'],        // 8月
    ['券商', '金融科技', '保险', '银行', '地产'],          // 9月
    ['医药', '创新药', '消费', '白酒', '医美'],            // 10月
    ['半导体', '芯片', '算力', '信创', 'AI'],              // 11月
    ['煤炭', '石油', '电力', '天然气', '公用事业']         // 12月
  ];
  const now = new Date();
  const prevMonth = (now.getMonth() - 1 + 12) % 12;
  return sectorCycle[prevMonth];
}

// ====== 统一分发（原始生成，不含禁词过滤）======
function generateScriptRaw(type) {
  const pool = buildPhrasePool();
  // 否定目标使用上月市场表现好的板块
  pool.negateTargetList = getMonthlyHotSectors();
  const cfg = { extraSections: 1 };
  
  let result;
  switch (type) {
    case 'news':     result = genNews(pool, cfg); break;
    case 'crisis':   result = genCrisis(pool, cfg); break;
    case 'reverse':  result = genReverse(pool, cfg); break;
    case 'story':    result = genStory(pool, cfg); break;
    case 'dialogue': result = genDialogue(pool, cfg); break;
    case 'record':   result = genRecord(pool, cfg); break;
    default:         result = genNews(pool, cfg); break;
  }
  
  const charCount = result.full.replace(/\s/g, '').length;
  result.structure.sentenceCount = result.sentenceCount;
  
  return {
    full: result.full,
    structure: result.structure,
    type,
    charCount,
    timestamp: new Date().toISOString(),
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6)
  };
}

// ====== 带禁词过滤的生成（UI调用的入口）======
function generateScript(type) {
  const script = generateScriptRaw(type);
  return censorScript(script);
}

// ----- 显示生成结果（批量模式）-----
function displayBatchResults(scripts) {
  const empty = document.getElementById('scriptEmpty');
  const loading = document.getElementById('scriptLoading');
  const results = document.getElementById('scriptResults');
  const btnCopy = document.getElementById('btnCopy');
  const btnRegen = document.getElementById('btnRegenerate');

  loading.style.display = 'none';
  empty.style.display = 'none';
  btnCopy.disabled = false;
  btnRegen.disabled = false;
  btnCopy.classList.remove('copied');

  const isSingle = scripts.length === 1;

  let html = '<div class="script-grid' + (isSingle ? ' single' : '') + '">';
  scripts.forEach((script, idx) => {
    const s = script.structure;
    const numberTag = scripts.length > 1 ? '<div class="card-number">#' + (idx + 1) + '</div>' : '';
    const warnTag = !script.clean
      ? '<div style="font-size:11px;color:var(--danger);margin-top:6px;">⚠ 含禁词「' + escapeHtml(script.dirtyWord || '') + '」已用尽重试次数</div>'
      : '';

    let scriptBody = '';
    // 如果有分段标签，按标签展示；否则直接展示全文（新版叙述模板的单段模式）
    const displayOrder = Object.keys(s).filter(k => k !== 'full' && k !== 'sentenceCount' && s[k]);
    if (displayOrder.length > 0) {
      const segStyles = ['seg-hook', 'seg-negate', 'seg-hint', 'seg-cta'];
      displayOrder.forEach((key, si) => {
        const label = TYPE_LABELS[key] || key;
        const style = segStyles[si % segStyles.length];
        scriptBody += '<span class="segment-label ' + style + '">' + label + '</span>' + escapeHtml(s[key]) + '。<br><br>';
      });
    } else {
      // 新版叙述模板：直接展示全文，保留自然换行
      const fullText = script.full || '';
      scriptBody = escapeHtml(fullText).replace(/\n/g, '<br>') + '<br><br>';
      // 尝试用句号分段加颜色标记
      const sentences = fullText.split(/[。！？]/).filter(Boolean);
      if (sentences.length >= 3) {
        const colors = ['#0071e3','#ff9500','#34c759','#af52de','#ff3b30','#0071e3'];
        let colored = '';
        sentences.forEach((seg, si) => {
          const color = colors[Math.floor(si / Math.max(1, Math.ceil(sentences.length / colors.length))) % colors.length];
          colored += '<span style="color:' + color + ';font-weight:500;">' + escapeHtml(seg.trim()) + '。</span>';
        });
        scriptBody = colored + '<br><br>';
      }
    }

    html += '\n      <div class="script-card">\n        ' + numberTag + '\n        <div class="script-text">' + scriptBody + '</div>\n        ' + warnTag + '\n        <div class="script-meta" style="display:flex;"><span class="meta-tag">📝 ' + script.charCount + '字</span> <span class="meta-tag">📏 ' + (script.structure.sentenceCount || '?') + '句</span></div>\n        <div class="card-actions">\n          <button class="card-btn" onclick="copySingleScript(event, ' + idx + ')">📋 复制</button>\n          <button class="card-btn" onclick="regenerateSingle(event, ' + idx + ')">🔄 换一版</button>\n        </div>\n      </div>';
  });
  html += '\n</div>';

  results.innerHTML = html;
  results.style.display = 'block';
  state.currentScript = scripts[0];
}

  showToast('🔄 已更换 #' + (idx + 1));

// ----- 将文本拆分为独立的视频稿（按空行/连续换行分隔）-----
function splitScripts(rawText) {
  // 先按连续换行（空行）拆分
  let blocks = rawText.split(/\n\s*\n/).map(b => b.trim()).filter(b => b.length > 0);

  // 如果只拆出1段，尝试按单换行拆分（兼容紧凑格式）
  if (blocks.length === 1) {
    const lines = rawText.split(/\n/).map(l => l.trim()).filter(l => l.length > 0);
    // 如果每行都足够长（可能是完整的脚本），按行拆分
    const longLines = lines.filter(l => l.length >= 20);
    if (longLines.length >= 2 && longLines.length === lines.length) {
      blocks = longLines;
    }
  }

  // 过滤太短的片段
  return blocks.filter(b => b.replace(/\s/g, '').length >= 15);
}

// ----- 输入时实时预览拆分结果 -----
document.getElementById('feedText').addEventListener('input', () => {
  const text = document.getElementById('feedText').value;
  const preview = document.getElementById('feedPreview');
  const scripts = splitScripts(text);

  if (scripts.length === 0) {
    preview.style.display = 'none';
    return;
  }

  const typeSelect = document.getElementById('feedType').value;
  const isAuto = typeSelect === 'auto';

  let html = `<strong>📊 识别到 <span style="color:var(--accent);">${scripts.length}</span> 条视频稿</strong>`;
  if (scripts.length === 1) {
    html += ` · 共 ${scripts[0].replace(/\s/g,'').length} 字`;
  } else {
    const totalChars = scripts.reduce((sum, s) => sum + s.replace(/\s/g, '').length, 0);
    html += ` · 共 ${totalChars} 字`;
  }

  scripts.slice(0, 5).forEach((s, i) => {
    const preview = s.slice(0, 50);

    const typeEmoji = {news:'📰',crisis:'⚠️',reverse:'🔄',story:'📖',dialogue:'💬',record:'🏆'};

  });

document.getElementById('btnFeedConfirm').addEventListener('click', () => {
  const text = document.getElementById('feedText').value.trim();
  const typeSelect = document.getElementById('feedType').value;

  if (!text) {
    showToast('⚠️ 请粘贴短视频稿文案');

  }

    return;
  }

  let learnedCount = 0;
  const typeStats = {};
  const batchId = Date.now().toString(36);

  scripts.forEach((scriptText, index) => {
    if (scriptText.replace(/\s/g, '').length < 15) return;

    // 类型识别
    let detectedType = typeSelect;
    if (typeSelect === 'auto') {
      detectedType = autoDetectType(scriptText);
    }

    // 提取短语
    const extracted = extractPhrasesFromScript(scriptText);

    // 添加到知识库
    state.knowledgeBase.push({
      id: batchId + '-' + index,
      type: detectedType,
      text: scriptText,
      extracted: extracted,
      timestamp: new Date().toISOString(),
      batchId: batchId
    });

    typeStats[detectedType] = (typeStats[detectedType] || 0) + 1;
    learnedCount++;
  });

  // 保存
  saveData();

  // 关闭模态框

});

// ----- 自动识别脚本类型 -----
function autoDetectType(text) {
  const patterns = {
    news: ['刚刚', '突发', '紧急', '临时加播', '一分钟前', '弹窗', '深夜', '凌晨', '突发'],
    crisis: ['调仓', '管住手', '注意了', '危险', '别乱操作', '赶紧跑', '来不及了', '泥沙俱下'],
    reverse: ['忘掉', '删除', '放下', '别再死磕', '不要看了', '彻底大变天', '别再看'],
    story: ['停车场', '回公司', '电脑关了', '下班', '吃饭', '掉头回去', '本来没准备', '复盘了一遍'],
    dialogue: ['A：', 'B：', '你跑了没', '跑了没有', '那你觉得'],
    record: ['谁先讲的', '一战成名', '名声鹊起', '老粉都懂', '没人怀疑', '马后炮', '哪次没带大家']
  };

  let bestType = 'news';
  let bestScore = 0;

  Object.entries(patterns).forEach(([type, keywords]) => {
    let score = 0;
    keywords.forEach(kw => {
      const re = new RegExp(kw, 'g');
      const matches = text.match(re);
      if (matches) score += matches.length;
    });
    if (score > bestScore) {
      bestScore = score;
      bestType = type;
    }
  });

  return bestType;
}

function renderKnowledgeBase() {
  const kbList = document.getElementById('kbList');
  if (state.knowledgeBase.length === 0) {
    kbList.innerHTML = '<div class="kb-empty">还没有投喂过稿件<br>点击「投喂爆款稿」开始构建知识库</div>';
    return;
  }

  const typeNames = {
    news: '📰 新闻突发', crisis: '⚠️ 危机预警', reverse: '🔄 反认知',
    switch: '🔄 赛道切换', era: '🔭 时代叙事', scarcity: '💎 限量筛选'
  };

  // 按批次分组显示
  const batches = new Map();
  state.knowledgeBase.forEach((item, index) => {
    const batchKey = item.batchId || ('single-' + item.id);
    if (!batches.has(batchKey)) batches.set(batchKey, []);
    batches.get(batchKey).push({ item, index });
  });

  let html = '';
  batches.forEach((group) => {
    const isBatch = group.length > 1;
    if (isBatch) {
      const firstType = group[0].item.type;
      const typeEmoji = typeNames[firstType] ? typeNames[firstType].split(' ')[0] : '📝';
      html += `<div style="font-size:11px;font-weight:600;color:var(--text-tertiary);padding:8px 4px 4px;letter-spacing:0.5px;">
        ${typeEmoji} 批次导入 · ${group.length} 条
        <button onclick="deleteBatchItems('${group[0].item.batchId}')" style="margin-left:8px;font-size:10px;border:none;background:none;color:var(--danger);cursor:pointer;opacity:0.7;">删除批次</button>
      </div>`;
    }
    group.forEach(({ item, index }) => {
      html += `
        <div class="kb-item" onclick="previewKbItem('${item.id}')">
          <div class="kb-type">${typeNames[item.type] || item.type}</div>
          <div class="kb-text">${escapeHtml(item.text.slice(0, 120))}...</div>
          <button class="kb-delete" onclick="event.stopPropagation(); deleteKbItem(${index})">✕</button>
        </div>`;
    });
  });

  kbList.innerHTML = html;
}

function previewKbItem(id) {
  const item = state.knowledgeBase.find(i => i.id === id);
  if (!item) return;
  const script = {
    full: item.text,
    structure: analyzeScriptStructure(item.text) || { hook: '', negate: '', hint: '', cta: '', full: item.text, sentenceCount: item.text.split(/[。！？]/).filter(s => s.trim().length > 0).length },
    type: item.type,
    length: 'medium',
    charCount: item.text.replace(/\s/g, '').length,
    timestamp: item.timestamp,
    id: item.id
  };
  displayScript(script);
  document.getElementById('kbPanel').classList.remove('open');
  showToast('📖 已加载知识库稿件');
}

function deleteKbItem(index) {
  state.knowledgeBase.splice(index, 1);
  saveData();
  renderKnowledgeBase();
  updateStats();
  showToast('🗑 已删除');
}

function deleteBatchItems(batchId) {
  if (!batchId || !confirm('确定删除整批导入的稿件吗？此操作不可恢复。')) return;
  state.knowledgeBase = state.knowledgeBase.filter(item => item.batchId !== batchId);
  saveData();
  renderKnowledgeBase();
  updateStats();
  showToast('🗑 已删除整批稿件');
}

function loadDefaultSeeds() {
  const batchId = 'default-' + Date.now().toString(36);
  let learnedCount = 0;
  const typeStats = {};

  DEFAULT_SEEDS.forEach((seed, index) => {
    const text = seed.text.trim();
    if (text.replace(/\s/g, '').length < 15) return;

    const detectedType = seed.type;
    const extracted = extractPhrasesFromScript(text);

    state.knowledgeBase.push({
      id: batchId + '-' + index,
      type: detectedType,
      text: text,
      extracted: extracted,
      timestamp: new Date().toISOString(),
      isSeed: true,
      batchId: batchId
    });

    typeStats[detectedType] = (typeStats[detectedType] || 0) + 1;
    learnedCount++;
  });

  localStorage.setItem('script_gen_seeded', '1');
  saveData();
  updateStats();
  renderKnowledgeBase();

  const typeNames = {news:'新闻突发',crisis:'危机预警',reverse:'反认知',story:'故事沉浸',dialogue:'对话剧情',record:'战绩背书'};
  const summary = Object.entries(typeStats)
    .map(([t, c]) => typeNames[t] + '×' + c)
    .join('、');
  return learnedCount;
}

function addToHistory(script) {
  state.history.unshift({
    preview: script.full.slice(0, 80),
    type: script.type,
    full: script.full,
    id: script.id,
    timestamp: script.timestamp
  });

  // 保留最近50条
  if (state.history.length > 50) state.history = state.history.slice(0, 50);
  saveData();
  renderHistory();
}

function renderHistory() {
  const area = document.getElementById('historyArea');
  const grid = document.getElementById('historyGrid');

  if (state.history.length === 0) {
    area.classList.remove('show');
    return;
  }

  area.classList.add('show');
  const typeNames = {
    news: '📰', crisis: '⚠️', reverse: '🔄', story: '📖', dialogue: '💬', record: '🏆'
  };

  grid.innerHTML = state.history.slice(0, 10).map(h => `
    <div class="history-item" onclick="loadHistoryItem('${h.id}')">
      <div class="h-type">${typeNames[h.type] || ''} ${h.type}</div>
      <div class="h-preview">${escapeHtml(h.preview)}...</div>
    </div>
  `).join('');
}

function loadHistoryItem(id) {
  const item = state.history.find(h => h.id === id);
  if (!item) return;
  const script = {
    full: item.full,
    structure: analyzeScriptStructure(item.full) || { hook: '', negate: '', hint: '', cta: '', full: item.full, sentenceCount: item.full.split(/[。！？]/).filter(s => s.trim().length > 0).length },
    type: item.type,
    length: 'medium',
    charCount: item.full.replace(/\s/g, '').length,
    timestamp: item.timestamp,
    id: item.id
  };
  displayScript(script);
  state.currentScript = script;
  showToast('📖 已加载历史稿件');
}

function saveData() {
  try {
    localStorage.setItem('script_gen_kb', JSON.stringify(state.knowledgeBase));
    localStorage.setItem('script_gen_history', JSON.stringify(state.history));
  } catch (e) {
    // localStorage 满了
    if (state.knowledgeBase.length > 20) {
      state.knowledgeBase = state.knowledgeBase.slice(-20);
    }
    if (state.history.length > 30) {
      state.history = state.history.slice(0, 30);
    }
    try {
      localStorage.setItem('script_gen_kb', JSON.stringify(state.knowledgeBase));
      localStorage.setItem('script_gen_history', JSON.stringify(state.history));
    } catch {
      showToast('⚠️ 存储空间不足，部分数据可能丢失');
    }
  }
}

function loadData() {
  try {
    const kb = localStorage.getItem('script_gen_kb');
    if (kb) state.knowledgeBase = JSON.parse(kb);

    const history = localStorage.getItem('script_gen_history');
    if (history) state.history = JSON.parse(history);
  } catch (e) {
    state.knowledgeBase = [];
    state.history = [];
  }
}

  document.getElementById('statTotal').textContent = `${state.knowledgeBase.length} 条`;

}

// ----- 键盘快捷键 -----
document.addEventListener('keydown', (e) => {
  // Cmd/Ctrl + Enter 生成
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('btnGenerate').click();
  }
  // Cmd/Ctrl + Shift + C 复制
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'C') {
    e.preventDefault();
    if (state.currentScripts && state.currentScripts.length) document.getElementById('btnCopy').click();
  }
  // Escape 关闭模态框/面板
  if (e.key === 'Escape') {
    document.getElementById('feedModal').classList.remove('open');
    document.getElementById('kbPanel').classList.remove('open');
  }
});

}

  const tests = [];
  const pass = (name) => { tests.push({ name, status: '✅' }); console.log('✅', name); };
  const fail = (name, err) => { tests.push({ name, status: '❌', error: err }); console.error('❌', name, err); };

  // Test 1: 检查 TYPE_STRUCTURES 完整性
  try {
    const types = ['news', 'crisis', 'reverse', 'story', 'dialogue', 'record'];
    types.forEach(t => {
      if (!TYPE_STRUCTURES[t]) throw new Error('缺少类型定义: ' + t);
      if (!TYPE_STRUCTURES[t].sequence || TYPE_STRUCTURES[t].sequence.length === 0)
        throw new Error('类型 ' + t + ' 缺少结构序列');
    });
    pass('6种类型结构定义完整');
  } catch(e) { fail('类型结构定义', e.message); }

  // Test 2: 检查每种类型能否正常生成
  try {
    const testTypes = ['news', 'crisis', 'reverse', 'story', 'dialogue', 'record'];
    testTypes.forEach(t => {
      const script = generateScriptRaw(t);
      if (!script || !script.full || script.full.length < 20)
        throw new Error('类型 ' + t + ' 生成内容异常: ' + JSON.stringify(script?.full?.substring(0, 50)));
    });
    pass('6种类型均能正常生成');
  } catch(e) { fail('生成功能', e.message); }

  // Test 3: 检查禁词过滤
  try {
    const fwResult = hasForbiddenWord('明天开盘散户可能人都要傻了');
    if (fwResult) throw new Error('正常文案被误判为含禁词: ' + fwResult);
    pass('禁词过滤正常（不会误判正常文案）');
  } catch(e) { fail('禁词过滤', e.message); }

  // Test 4: 检查知识库功能
  try {
    const initialCount = state.knowledgeBase.length;
    feedToKB('测试稿件：明天A股开盘可能会有大波动，刚刚突发了这个消息。点头像进直播间');
    if (state.knowledgeBase.length !== initialCount + 1)
      throw new Error('知识库投喂后条数未变化');
    state.knowledgeBase.pop();
    pass('知识库投喂功能正常');
  } catch(e) { fail('知识库投喂', e.message); }

  // Test 5: 检查短语池有效性
  try {
    const pool = buildPhrasePool();
    const required = ['eventPhrases', 'emotionPhrases', 'ctaPhrases', 'negateTargetList', 'negatePhrases'];
    required.forEach(k => {
      if (!Array.isArray(pool[k]) || pool[k].length === 0)
        throw new Error('短语池缺少或为空: ' + k);
    });
    pass('短语池包含所有必要字段');
  } catch(e) { fail('短语池', e.message); }

  // Test 6: 检查各类型的独特结构确实不同
  try {
    const structures = {
      news: TYPE_STRUCTURES.news.sequence.map(s => s.id).join(','),
      crisis: TYPE_STRUCTURES.crisis.sequence.map(s => s.id).join(','),
      reverse: TYPE_STRUCTURES.reverse.sequence.map(s => s.id).join(','),
      story: TYPE_STRUCTURES.story.sequence.map(s => s.id).join(','),
      dialogue: TYPE_STRUCTURES.dialogue.sequence.map(s => s.id).join(','),
      record: TYPE_STRUCTURES.record.sequence.map(s => s.id).join(','),
    };
    const uniqueStructures = new Set(Object.values(structures));
    if (uniqueStructures.size !== 6)
      throw new Error('存在相同的类型结构: ' + JSON.stringify(structures));
    pass('6种类型的结构各不相同（已验证）');
  } catch(e) { fail('类型结构差异性', e.message); }

  // Test 7: 检查生成结果字数在合理范围
  try {
    const script = generateScriptRaw('news');
    if (!script.charCount || script.charCount < 30)
      throw new Error('生成内容字数异常: ' + script.charCount);
    pass('模板生成字数正常（' + script.charCount + '字）');
  } catch(e) { fail('生成字数', e.message); }

  // Test 8: 检查 TYPE_LABELS 覆盖所有组件
  try {
    const allIds = new Set();
    Object.values(TYPE_STRUCTURES).forEach(t => {
      t.sequence.forEach(s => allIds.add(s.id));
    });
    const missing = [...allIds].filter(id => !TYPE_LABELS[id]);
    if (missing.length > 0) throw new Error('缺少标签映射: ' + missing.join(', '));
    pass('所有组件ID都有对应的中文标签');
  } catch(e) { fail('组件标签', e.message); }

  // Test 9: 生成一条各类型样本并打印
  try {
    console.log('\n===== 各类型样本生成结果 =====');
    ['news', 'crisis', 'reverse', 'story', 'dialogue', 'record'].forEach(t => {
      const s = generateScriptRaw(t);
      console.log('\n--- ' + TYPE_STRUCTURES[t].name + ' (' + s.charCount + '字) ---');
      console.log(s.full);
      console.log('结构:', Object.keys(s.structure).filter(k => k !== 'full' && s.structure[k]).join(' → '));
    });
    pass('样本打印完成（见上方输出）');
  } catch(e) { fail('样本打印', e.message); }

  // 汇总
  const passed = tests.filter(t => t.status === '✅').length;
  const failed = tests.filter(t => t.status === '❌').length;
  console.log('\n========== 测试结果: ' + passed + '/' + tests.length + ' 通过 ==========');
  if (failed > 0) {
    console.error('失败项:', tests.filter(t => t.status === '❌').map(t => t.name));
  }

  return { total: tests.length, passed, failed, tests };
};
</script>
